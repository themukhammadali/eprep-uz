<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nava — NewUU entrance maths practice</title>

<!-- MathJax (renders \( \) inline and \[ \] display) -->
<script>
  window.MathJax = {
    tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
    svg: { fontCache: 'global' },
    startup: { typeset: false }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<!-- Accounts + cross-device progress sync (no-ops until supabase-config.js is filled in). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ---------- Light, flat, Bluebook-style theme ---------- */
  :root {
    --bg:        #ffffff;
    --ink:       #1a1a1a;
    --muted:     #6b7280;
    --line:      #e8e8e8;
    --blue:      #2b7fff;
    --blue-soft: #eaf2ff;
    --green:     #16a34a;
    --green-soft:#f0faf3;
    --amber:     #d97706;
    --red:       #dc2626;
    --red-soft:  #fdf2f2;
    --surface:   #ffffff;
    --surface-2: #fafafa;
    --surface-3: #f5f7fa;
    --shadow:    rgba(0,0,0,.10);
    --radius:    14px;
  }

  /* ---------- Dark theme (overrides the variables above) ---------- */
  :root[data-theme="dark"] {
    --bg:        #0f1115;
    --ink:       #e6e8eb;
    --muted:     #9aa1ab;
    --line:      #2a2f3a;
    --blue:      #4f8dff;
    --blue-soft: #18253d;
    --green:     #35c46b;
    --green-soft:#14271b;
    --amber:     #e0a13b;
    --red:       #ff6b6b;
    --red-soft:  #2c1a1a;
    --surface:   #161922;
    --surface-2: #1b1f29;
    --surface-3: #232838;
    --shadow:    rgba(0,0,0,.55);
  }

  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    transition: background .25s ease, color .25s ease;
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font-family: inherit; }

  /* Visible keyboard focus on every custom control (UA outline is invisible on dark surfaces). */
  :focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; border-radius: 4px; }
  .icon { width: 18px; height: 18px; display: inline-block; flex: none; stroke: currentColor; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round; fill: none; vertical-align: -.2em; }
  .icon-sm { width: 15px; height: 15px; }
  .icon-xs { width: 13px; height: 13px; }

  /* ---------- Brand / logo / runner timer ---------- */
  .brand { display: flex; align-items: center; gap: 10px; background: none; border: none;
    cursor: pointer; color: var(--ink); font-size: 16px; font-weight: 650; }
  .logo { width: 30px; height: 30px; border-radius: 8px; background: var(--blue); color: #fff;
    display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
  .timer { display: inline-flex; align-items: center; gap: 7px; font-variant-numeric: tabular-nums;
    font-size: 14px; color: var(--muted); background: var(--surface); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 13px; }
  .timer .ic { font-size: 13px; }
  .timer.low { color: var(--red); border-color: var(--red); font-weight: 700; }

  /* ---------- Test results ---------- */
  .results { max-width: 720px; margin: 0 auto; }
  .results h2 { font-size: 28px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 8px; }
  .results .res-sub { color: var(--muted); font-size: 15px; margin-bottom: 20px; }
  .res-score { display: flex; align-items: baseline; gap: 10px; margin-bottom: 22px; }
  .res-score .big { font-size: 48px; font-weight: 800; letter-spacing: -1px; }
  .res-score .pct { font-size: 18px; color: var(--muted); font-weight: 600; }
  .res-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .res-cell { border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; background: var(--surface); }
  .res-cell .l { font-size: 13px; color: var(--muted); font-weight: 600; }
  .res-cell .v { font-size: 26px; font-weight: 700; margin-top: 6px; }
  .res-cell.correct .v { color: var(--green); }
  .res-cell.wrong .v { color: var(--red); }
  .res-banner { background: var(--red-soft); border: 1px solid var(--red); color: var(--red);
    border-radius: 12px; padding: 12px 16px; font-weight: 600; font-size: 14px; margin-bottom: 20px; }
  .res-actions { display: flex; flex-wrap: wrap; gap: 12px; }
  @media (max-width: 620px) { .res-grid { grid-template-columns: repeat(2, 1fr); } }

  #app { flex: 1 1 auto; min-width: 0; max-width: 1040px; margin: 0 auto; padding: 36px 32px 96px; width: 100%; }

  /* ---------- Dashboard ---------- */
  .greeting h1 { font-size: 30px; font-weight: 750; letter-spacing: -.5px; }
  .greeting .subtitle { color: var(--muted); margin-top: 7px; font-size: 15px; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin: 30px 0; }
  .stat { border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; background: var(--surface); }
  .stat-label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .stat-val { font-size: 28px; font-weight: 700; margin-top: 6px; letter-spacing: -.5px; }
  .stat-sub { font-size: 15px; color: var(--muted); font-weight: 600; }
  .stat.correct .stat-val { color: var(--green); }
  .stat.wrong .stat-val { color: var(--red); }
  .mini-bar { height: 6px; background: var(--line); border-radius: 999px; margin-top: 12px; overflow: hidden; }
  .mini-fill { display: block; height: 100%; background: var(--blue); border-radius: 999px; transition: width .4s ease; }

  /* ---------- Due for review ---------- */
  .due { border: 1px solid var(--line); background: var(--blue-soft); border-radius: var(--radius);
    padding: 18px 20px; margin: 6px 0 32px; }
  .due h3 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .due h3 .badge { background: var(--blue); color: #fff; border-radius: 999px; font-size: 12px;
    padding: 1px 9px; font-weight: 700; }
  .due-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .due-chip { display: inline-flex; align-items: center; gap: 9px; border: 1px solid var(--line);
    background: var(--surface); border-radius: 999px; padding: 7px 14px; cursor: pointer; font-size: 14px; color: var(--ink); }
  .due-chip:hover { border-color: var(--blue); }
  .due-chip .go { color: var(--blue); font-weight: 600; }

  /* ---------- Topic tracker ---------- */
  .tracker-title { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: .6px; margin-bottom: 14px; }
  .tracker { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .unit-header { display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px; background: var(--surface-2); border-top: 1px solid var(--line);
    font-weight: 650; font-size: 14px; }
  .unit-header:first-child { border-top: none; }
  .unit-header .u-idx { display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 6px; background: var(--blue-soft); color: var(--blue);
    font-size: 12px; font-weight: 700; margin-right: 9px; }
  .unit-header .u-meta { color: var(--muted); font-weight: 600; font-size: 13px; }

  .trow { display: grid; grid-template-columns: 1fr 150px 52px 96px; align-items: center; gap: 14px;
    width: 100%; text-align: left; background: var(--surface); border: none; border-top: 1px solid var(--line);
    padding: 13px 18px; cursor: pointer; font-size: 15px; color: var(--ink); }
  .trow:hover { background: var(--surface-2); }
  .trow-name { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .trow-name .txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tag-due { flex: 0 0 auto; font-size: 10.5px; font-weight: 700; color: var(--blue);
    background: var(--blue-soft); border-radius: 999px; padding: 1px 8px; }
  .pbar { display: block; height: 7px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .pfill { display: block; height: 100%; background: var(--blue); border-radius: 999px; transition: width .4s ease; }
  .trow-count { font-size: 13px; color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }
  .trow-acc { display: flex; align-items: center; gap: 7px; justify-content: flex-end;
    font-size: 14px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #cbd0d6; flex: 0 0 auto; }
  .dot.g { background: var(--green); }
  .dot.a { background: var(--amber); }
  .dot.r { background: var(--red); }

  /* Unit challenge row (end of each unit) */
  .trow.challenge-row { background: var(--blue-soft); }
  .trow.challenge-row:hover { background: var(--surface-3); }
  .trow.challenge-row .trow-name { color: var(--blue); font-weight: 650; }
  /* Final challenge row — the full mock exam, the last test before exam day */
  .trow.final-row { background: var(--red-soft); border: 1px solid var(--red); margin-top: 8px; }
  .trow.final-row:hover { background: var(--surface-3); }
  .trow.final-row .trow-name { color: var(--red); font-weight: 750; }
  .trow.final-row .ch-meta { color: var(--amber); }
  .bolt { flex: 0 0 auto; }
  .ch-meta { font-size: 12px; color: var(--muted); font-weight: 500; }

  .dash-foot { margin-top: 22px; text-align: center; }
  .reset-link { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; }
  .reset-link:hover { color: var(--red); text-decoration: underline; }

  /* ---------- Profile + Timeline ---------- */
  .profile-head { display: flex; align-items: center; gap: 18px; }
  .profile-head .subtitle { margin-top: 4px; }
  .profile-avatar { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px;
    border-radius: 50%; background: var(--blue); color: #fff; font-weight: 700; font-size: 26px;
    text-transform: uppercase; flex: none; }
  .profile-meta { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .profile-form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px 20px; }
  .profile-field { display: flex; flex-direction: column; gap: 6px; }
  .profile-field.full { grid-column: 1 / -1; }
  .profile-field label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .profile-field input, .profile-field textarea { font: inherit; color: var(--ink); background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; }
  .profile-field textarea { resize: vertical; min-height: 80px; }
  .profile-field input:focus, .profile-field textarea:focus { outline: none; border-color: var(--blue); }
  .profile-form > .btn-primary { grid-column: 1 / -1; justify-self: start; margin-top: 4px; }
  @media (max-width: 860px) { .profile-form { grid-template-columns: 1fr; } }

  .timeline { display: flex; flex-direction: column; }
  .tl-row { position: relative; padding: 0 0 24px 24px; }
  .tl-row:last-child { padding-bottom: 0; }
  .tl-row::before { content: ""; position: absolute; left: 4px; top: 14px; bottom: -2px; width: 2px; background: var(--line); }
  .tl-row:last-child::before { display: none; }
  .tl-dot { position: absolute; left: 0; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--blue); }
  .tl-label { font-weight: 600; }
  .tl-date { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ---------- Topic / skill screen ---------- */
  .back { background: none; border: none; color: var(--blue); cursor: pointer; font-size: 14px;
    font-weight: 600; padding: 0; margin-bottom: 14px; }
  .back:hover { text-decoration: underline; }
  .unit-tag { display: inline-block; font-size: 12.5px; font-weight: 600; color: var(--blue);
    background: var(--blue-soft); padding: 4px 11px; border-radius: 20px; margin-bottom: 10px; }
  .topic-head h2 { font-size: 26px; font-weight: 650; letter-spacing: -.3px; }

  .reading { max-width: 860px; margin-top: 22px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 26px 28px; margin-bottom: 22px; }
  .card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted);
    margin-bottom: 14px; font-weight: 700; }
  .prose { font-size: 18px; line-height: 1.65; }
  .prose p { margin-bottom: 12px; }
  .prose ul { padding-left: 22px; }
  .prose li { margin-bottom: 8px; }
  .prose.placeholder { color: var(--muted); font-style: italic; }
  .start-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 4px; }

  .btn-primary { background: var(--blue); color: #fff; border: none; border-radius: 10px;
    padding: 12px 22px; font-weight: 600; cursor: pointer; font-size: 15px; }
  .btn-primary:hover { background: #1f6ff0; }
  .btn-ghost { background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 18px; cursor: pointer; font-size: 15px; color: var(--ink); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--muted); }
  .btn-ghost:disabled { opacity: .4; cursor: default; }
  .btn-ghost.active { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }
  .btn-ghost.danger-btn { color: var(--red); }
  .btn-ghost.danger-btn:hover { border-color: var(--red); background: var(--red-soft); }

  /* ---------- Bluebook question runner ---------- */
  .runner { max-width: 720px; margin: 0 auto; }
  .runner-top { display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 16px; border-bottom: 1px solid var(--line); margin-bottom: 34px; }
  .runner-title { font-size: 14px; color: var(--muted); font-weight: 600; }
  .stage { min-height: 280px; }
  .q-big { font-size: 22px; line-height: 1.45; margin-bottom: 28px; }
  .choices { display: flex; flex-direction: column; gap: 16px; }
  .choice { display: flex; align-items: center; gap: 16px; width: 100%; text-align: left; background: var(--surface);
    border: 1.5px solid var(--line); border-radius: 14px; padding: 17px 20px; font-size: 18px;
    color: var(--ink); cursor: pointer; transition: border-color .12s, background .12s; }
  .choice:hover:not(:disabled) { border-color: var(--blue); background: var(--surface-2); }
  .choice:disabled { cursor: default; }
  .ch-letter { flex: 0 0 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center; font-weight: 700;
    font-size: 15px; color: var(--muted); }
  .choice.chosen:not(.correct):not(.wrong) { border-color: var(--blue); background: var(--blue-soft); }
  .choice.correct { border-color: var(--green); background: var(--green-soft); }
  .choice.correct .ch-letter { background: var(--green); color: #fff; border-color: var(--green); }
  .choice.wrong { border-color: var(--red); background: var(--red-soft); }
  .choice.wrong .ch-letter { background: var(--red); color: #fff; border-color: var(--red); }
  /* Non-colour cue for correct/incorrect (accessibility) */
  .choice.correct::after { content: "✓"; margin-left: auto; color: var(--green); font-weight: 800; font-size: 19px; line-height: 1; }
  .choice.wrong::after { content: "✗"; margin-left: auto; color: var(--red); font-weight: 800; font-size: 19px; line-height: 1; }

  .explain { margin-top: 28px; border: 1px solid var(--line); border-radius: 12px; padding: 20px 22px; background: var(--surface-2); }
  .explain-verdict { font-weight: 700; margin-bottom: 8px; font-size: 15px; }
  .explain-verdict.ok { color: var(--green); }
  .explain-verdict.bad { color: var(--red); }
  .explain-label { font-size: 11px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted);
    font-weight: 700; margin-bottom: 5px; }
  .explain-body { font-size: 16px; line-height: 1.55; }

  .runner-bar { position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; padding: 16px 0; margin-top: 38px; }
  .count { font-size: 14px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .bar-actions { display: flex; gap: 10px; }

  /* ---------- Top nav tabs ---------- */

  /* ---------- Page header (Learn / Practice) ---------- */
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px;
    margin-bottom: 10px; flex-wrap: wrap; }
  .page-head h1 { font-size: 30px; font-weight: 750; letter-spacing: -.6px; }
  .page-head .ph-sub { color: var(--muted); font-size: 15px; margin-top: 4px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: .6px; margin: 36px 0 14px; }

  /* ---------- Refined analytics cards ---------- */
  .stats { gap: 16px; margin: 24px 0 8px; }
  .stat { position: relative; padding: 20px 22px; border-radius: 16px; overflow: hidden; }
  .stat-label { font-size: 13.5px; }
  .stat-val { font-size: 34px; margin-top: 8px; font-weight: 750; }
  .stat-ic { position: absolute; right: 14px; bottom: 10px; font-size: 30px; opacity: .07; }

  /* ---------- Units overview cards ---------- */
  .unit-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .ucard { text-align: left; background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px 18px 16px; cursor: pointer; color: var(--ink); transition: border-color .15s, transform .1s; }
  .ucard:hover { border-color: var(--blue); transform: translateY(-1px); }
  .ucard .uc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .ucard .uc-idx { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px;
    border-radius: 8px; background: var(--blue-soft); color: var(--blue); font-weight: 800; font-size: 13px; flex: none; }
  .ucard .uc-name { font-weight: 650; font-size: 15px; line-height: 1.3; }
  .ucard .uc-meta { display: flex; align-items: center; justify-content: space-between; font-size: 13px;
    color: var(--muted); margin-bottom: 8px; }

  /* ---------- "Practice all topics" hero card ---------- */
  .practice-all { display: flex; align-items: center; justify-content: space-between; gap: 18px;
    border: 1px solid var(--line); border-radius: 16px; background: var(--surface-2);
    padding: 24px 26px; margin: 24px 0 30px; }
  .practice-all .pa-text h3 { font-size: 18px; font-weight: 700; }
  .practice-all .pa-text p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  /* ---------- Filters (segmented control) ---------- */
  .seg { display: inline-flex; gap: 4px; padding: 4px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--surface); flex-wrap: wrap; }
  .seg button { background: none; border: none; border-radius: 999px; padding: 7px 14px;
    font-size: 13.5px; font-weight: 600; color: var(--muted); cursor: pointer; }
  .seg button:hover { color: var(--ink); }
  .seg button.active { background: var(--blue); color: #fff; }

  /* ---------- Grouped list (Learn / Practice) — airy variant of the tracker ---------- */
  .group { margin-top: 32px; }
  .group-head { font-size: 18px; font-weight: 700; letter-spacing: -.2px; margin-bottom: 10px; }
  .listcard { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--surface); }
  .lrow { display: grid; grid-template-columns: 26px 1fr 150px 56px 100px; align-items: center; gap: 18px;
    width: 100%; text-align: left; background: var(--surface); border: none; border-top: 1px solid var(--line);
    padding: 16px 20px; cursor: pointer; font-size: 15.5px; color: var(--ink); }
  .lrow:first-child { border-top: none; }
  .lrow:hover { background: var(--surface-2); }
  .lrow .lr-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center; font-size: 13px; color: transparent; }
  .lrow .lr-check.done { background: var(--green); border-color: var(--green); color: #fff; }
  .lrow .lr-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 550; }
  .lrow .lr-go { font-size: 13.5px; font-weight: 650; color: var(--blue); text-align: right; white-space: nowrap; }
  .empty { padding: 36px 28px; text-align: center; color: var(--muted); font-size: 14px;
    border: 1px dashed var(--line); border-radius: 16px; background: var(--surface-2); margin-top: 20px; }
  .empty-state { max-width: 560px; margin: 26px auto 0; padding: 38px 32px; text-align: center;
    border: 1px dashed var(--line); border-radius: 16px; background: var(--surface-2); }
  .empty-ic { display: inline-flex; align-items: center; justify-content: center; width: 46px; height: 46px;
    border-radius: 13px; background: var(--blue-soft); color: var(--blue); margin-bottom: 16px; }
  .empty-state h2 { font-size: 21px; line-height: 1.25; letter-spacing: -.2px; margin-bottom: 8px; }
  .empty-state p { color: var(--muted); font-size: 15px; max-width: 380px; margin: 0 auto 22px; }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .unit-cards { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 620px) {
    #app { padding: 26px 18px 84px; }
    .brand .brand-name { display: none; }
    .trow { grid-template-columns: 1fr 64px 82px; gap: 10px; padding: 12px 14px; font-size: 14px; }
    .trow .trow-count { display: none; }
    .unit-header { padding: 11px 14px; }
    .unit-cards { grid-template-columns: 1fr; }

  /* ---------------- Line chart ---------------- */
  .card.chartcard, .card.heatcard, .card.diffcard { padding: 18px 18px 14px; }

  <script>
  (function () {
    var cfg = window.SUPABASE_CONFIG || {};
    var ready = !!(cfg.url && cfg.anonKey && window.supabase);
    if (ready) {
      // Source of truth is the Supabase session; redirect if signed out.
      var client = window.__supabaseClient ||
        (window.__supabaseClient = window.supabase.createClient(cfg.url, cfg.anonKey));
      client.auth.getSession().then(function (r) {
        if (!r.data.session) window.location.replace("signup.html");
      }).catch(function () { window.location.replace("signup.html"); });
      return;
    }
    // Local-only fallback (no backend yet): require a local profile.
    try {
      var p = JSON.parse(localStorage.getItem("nava_profile") || "null");
      if (!p || !p.name) window.location.replace("signup.html");
    } catch (e) { window.location.replace("signup.html"); }
  })();

    const locUnitName = (u) => u.name;

    function typeset(node) {

    /* ---------------- persistence ----------------
       DB shape:
         answers  — { [qid]: { sel, correct, ts } }   latest attempt per question
         review   — { [skillId]: { stage, due, last, acc } }  spaced repetition
         activity — [ { ts, qid, correct, diff, ms } ]  append-only attempt log
                    (powers daily charts, heatmap, streaks and avg-time-by-difficulty)
         saved    — { [qid]: { on, ts } }   bookmarked questions (ts → last-write-wins sync)
         profile  — { name, surname, email, track, bio, school, grade, region,
                      favoriteSubject, dreamUniversity, dreamCareer, joinedAt, updatedAt }
                    identity fields shown on the Profile page; a single object,
                    not a per-key map, so it merges as a whole by `updatedAt` */
    const STORE = "nava_stats_v2";
    let DB = { answers: {}, review: {}, activity: [], saved: {}, profile: {} };
    try {
      const raw = JSON.parse(localStorage.getItem(STORE));
      if (raw && typeof raw === "object") DB = {
        answers: raw.answers || {}, review: raw.review || {},
        activity: Array.isArray(raw.activity) ? raw.activity : [],
        saved: raw.saved || {}, profile: raw.profile || {},
        activitySeeded: !!raw.activitySeeded
      };
    } catch (e) {}
    const saveLocal = () => { try { localStorage.setItem(STORE, JSON.stringify(DB)); } catch (e) {} };
    // save() persists locally always, and (when signed in) pushes to the cloud on a debounce.
    const save = () => { saveLocal(); cloud.schedulePush(); };
    // Whole-object last-write-wins (unlike mergeBy()/mergeActivity() below, which merge
    // per-key/append — profile is a single object, not a map of independent records).
    function mergeProfile(a, b) {
      a = a || {}; b = b || {};
      return (Number(b.updatedAt) || 0) >= (Number(a.updatedAt) || 0) ? b : a;
    }

    /* ---------------- cloud accounts + sync (Supabase) ---------------- */
    // Self-contained: if Supabase isn't configured/loaded, every method no-ops and
    // the app behaves exactly as the local-only version. Access is restricted per-user
    // by Row-Level Security (see scripts/supabase-schema.sql); the anon key is public.
    const cloud = (function () {
      const cfg = window.SUPABASE_CONFIG || {};
      const ready = !!(cfg.url && cfg.anonKey && window.supabase);
      const client = ready ? (window.__supabaseClient || window.supabase.createClient(cfg.url, cfg.anonKey)) : null;
      let user = null;
      let pushTimer = null;

      // ---- merge: combine two { answers, review } blobs without losing progress.
      // Answers are keyed per question and carry `ts`; reviews per skill carry `last`.
      // For each key we keep the most recently written entry (last-write-wins per key).
      function mergeBy(a, b, stampKey) {
        const out = {}, keys = new Set([...Object.keys(a || {}), ...Object.keys(b || {})]);
        keys.forEach((k) => {
          const x = a && a[k], y = b && b[k];
          if (!x) { out[k] = y; return; }
          if (!y) { out[k] = x; return; }
          out[k] = (Number(y[stampKey]) || 0) >= (Number(x[stampKey]) || 0) ? y : x;
        });
        return out;
      }
      // Append-only activity log: union both, de-duped by a stable per-event key.
      function mergeActivity(a, b) {
        const out = [], seen = new Set();
        [...(a || []), ...(b || [])].forEach((ev) => {
          if (!ev || ev.ts == null) return;
          const k = ev.ts + "|" + ev.qid;
          if (seen.has(k)) return;
          seen.add(k); out.push(ev);
        });
        out.sort((x, y) => x.ts - y.ts);
        return out;
      }
      function merge(local, remote) {
        return {
          answers: mergeBy(local.answers, remote.answers, "ts"),
          review: mergeBy(local.review, remote.review, "last"),
          activity: mergeActivity(local.activity, remote.activity),
          saved: mergeBy(local.saved, remote.saved, "ts"),
          profile: mergeProfile(local.profile, remote.profile),
          activitySeeded: !!(local.activitySeeded || remote.activitySeeded),
        };
      }

      // ---- UI helpers
      const $ = (id) => document.getElementById(id);
      function setStatus(text) { const el = $("authStatus"); if (el) el.textContent = text; }
      function renderAuthUI() {
        const wrap = $("authWrap"); if (!wrap) return;
        wrap.hidden = false;
        const label = $("authLabel"), avatar = $("authAvatar");
        if (user) {
          const email = user.email || "";
          label.textContent = email.split("@")[0] || "Account";
          avatar.hidden = false;
          avatar.textContent = (email[0] || "?");
          $("authEmail").textContent = email;
          $("signOutBtn").hidden = false;
        } else {
          label.textContent = "Sign in";
          avatar.hidden = true;
          $("authEmail").textContent = "";
          setStatus("");
          $("signOutBtn").hidden = true;
        }
      }

      // ---- sync
      async function pull() {
        if (!client || !user) return;
        setStatus("Syncing…");
        const { data, error } = await client.from("progress").select("data").eq("user_id", user.id).maybeSingle();
        if (error) { setStatus("Sync error"); return; }
        const remote = (data && data.data) || { answers: {}, review: {}, activity: [], saved: {}, profile: {} };
        DB = merge(DB, remote);
        trimActivity();
        saveLocal();
        // Mirror the merged profile back into the standalone profile-store key and
        // refresh the UI — otherwise a name/bio set on one device would never show
        // up on another (only quiz progress used to make this round-trip).
        if (DB.profile && DB.profile.name) STUDENT = DB.profile.name;
        try { localStorage.setItem(PROFILE_STORE, JSON.stringify(DB.profile || {})); } catch (e) {}
        await push();           // write the merged result straight back up
        if (typeof render === "function") render();
        if (typeof updateProfileUI === "function") updateProfileUI();
        setStatus("Synced ✓");
      }
      async function push() {
        if (!client || !user) return;
        const { error } = await client.from("progress")
          .upsert({ user_id: user.id, data: DB, updated_at: new Date().toISOString() });
        setStatus(error ? "Sync error" : "Synced ✓");
      }
      function schedulePush() {
        if (!client || !user) return;
        setStatus("Saving…");
        clearTimeout(pushTimer);
        pushTimer = setTimeout(push, 1200);
      }

      // ---- auth actions
      async function signInWithPassword(email, password) {
        return client.auth.signInWithPassword({ email, password });
      }
      async function signUpWithPassword(email, password) {
        return client.auth.signUp({ email, password, options: { emailRedirectTo: window.location.href } });
      }
      async function signOut() {
        if (client) await client.auth.signOut();
        // Don't leave the user's name/email sitting in localStorage on a shared device.
        try { localStorage.removeItem(PROFILE_STORE); } catch (e) {}
        // When the backend gates the app, a signed-out user no longer belongs here.
        if (ready) window.location.replace("index.html");
      }

      // ---- boot
      function init() {
        // Sign-in lives on the landing page now; the app only reads the session
        // (to greet by name and sync progress) and is reached through the gate.
        wireUI();              // no-ops unless the in-app auth elements exist
        if (!ready) return;    // no backend yet — sync is inert
        client.auth.getSession().then(({ data }) => onAuth(data.session));
        client.auth.onAuthStateChange((_e, session) => onAuth(session));
      }
      function displayName(u) {
        if (!u) return "";
        const m = u.user_metadata || {};
        if (m.name) return m.name;
        if (m.full_name) return m.full_name;
        const local = (u.email || "").split("@")[0];
        return local ? local.charAt(0).toUpperCase() + local.slice(1) : "";
      }
      function onAuth(session) {
        const next = session ? session.user : null;
        const changed = (next && next.id) !== (user && user.id);
        user = next;
        STUDENT = displayName(user);
        renderAuthUI();
        if (typeof updateProfileUI === "function") updateProfileUI();
        if (typeof render === "function") render();   // refresh greeting
        if (user && changed) pull();
      }

      function wireUI() {
        const btn = $("authBtn"), menu = $("authMenu");
        const modal = $("authModal"), form = $("authForm"), msg = $("authMsg");
        if (!btn || !modal || !form) return;   // in-app auth UI removed — nothing to wire
        const pwInput = $("authPasswordInput"), submit = $("authSubmitBtn");
        const tabIn = $("authTabSignIn"), tabUp = $("authTabSignUp");
        let mode = "signin";   // "signin" | "signup"

        function applyMode(next) {
          mode = next;
          const signup = mode === "signup";
          tabIn.classList.toggle("is-active", !signup);
          tabUp.classList.toggle("is-active", signup);
          $("authTitle").textContent = signup ? "Create your account" : "Welcome back";
          $("authSub").textContent = signup
            ? "Sign up to save your answers, accuracy and review schedule across every device."
            : "Sign in to sync your answers, accuracy and review schedule across every device.";
          submit.textContent = signup ? "Create account" : "Sign in";
          pwInput.setAttribute("autocomplete", signup ? "new-password" : "current-password");
          msg.hidden = true;
        }
        function toggleMenu(open) {
          const show = open != null ? open : menu.hidden;
          menu.hidden = !show; btn.setAttribute("aria-expanded", String(show));
        }
        function openModal() { modal.hidden = false; setTimeout(() => $("authEmailInput").focus(), 30); }
        function closeModal() { modal.hidden = true; msg.hidden = true; }

        tabIn.addEventListener("click", () => applyMode("signin"));
        tabUp.addEventListener("click", () => applyMode("signup"));

        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          if (user) toggleMenu(); else openModal();
        });
        document.addEventListener("click", (e) => {
          if (!menu.hidden && !e.target.closest(".auth-wrap")) toggleMenu(false);
        });
        $("authCloseBtn").addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
        document.addEventListener("keydown", (e) => { if (e.key === "Escape") { toggleMenu(false); closeModal(); } });
        $("signOutBtn").addEventListener("click", () => { toggleMenu(false); signOut(); });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = $("authEmailInput").value.trim();
          const password = pwInput.value;
          if (!email || !password) return;
          if (!client) {   // no backend wired yet — preview only
            msg.hidden = false; msg.className = "auth-msg ok";
            msg.textContent = "Accounts aren't connected yet — this is a preview. Sign-in is coming soon.";
            return;
          }
          if (password.length < 6) {
            msg.hidden = false; msg.className = "auth-msg err";
            msg.textContent = "Password must be at least 6 characters.";
            return;
          }
          const label = mode === "signup" ? "Create account" : "Sign in";
          submit.disabled = true; submit.textContent = mode === "signup" ? "Creating…" : "Signing in…";
          const { data, error } = mode === "signup"
            ? await signUpWithPassword(email, password)
            : await signInWithPassword(email, password);
          submit.disabled = false; submit.textContent = label;
          if (error) {
            msg.hidden = false; msg.className = "auth-msg err";
            msg.textContent = error.message || "Something went wrong. Please try again.";
            return;
          }
          // Sign-up with email confirmation enabled returns a user but no active session.
          if (mode === "signup" && data && data.user && !data.session) {
            msg.hidden = false; msg.className = "auth-msg ok";
            msg.textContent = "Account created. Check your inbox to confirm your email, then sign in.";
            return;
          }
          // Signed in (or sign-up auto-confirmed): onAuthStateChange closes things out.
          pwInput.value = "";
          closeModal();
        });
      }

      return { init, schedulePush };
    })();

    /* ---------------- data access ---------------- */
    function questionsFor(bank, skillId) {
      const units = COURSE_DATA[bank] || [];
      for (const u of units) {
        const s = (u.skills || []).find((sk) => sk.id === skillId);
        if (s) return s.questions || [];
      }
      return [];
    }
    function findSkill(id) {
      for (const u of COURSE_DATA.units) {
        const s = u.skills.find((x) => x.id === id);
        if (s) return { unit: u, skill: s };
      }
      return null;
    }
    function allSkills() {
      const out = [];
      COURSE_DATA.units.forEach((u) => u.skills.forEach((s) => out.push({ unit: u, skill: s })));
      return out;
    }
    const TOTAL_SKILLS = allSkills().length;

    /* ---------------- stats ---------------- */
    // Per-skill PRACTICE stats (drives the skill rows & topic completion)
    function practiceStats(skillId) {
      const list = questionsFor("practiceQuestions", skillId);
      let done = 0, correct = 0;
      list.forEach((q, i) => {
        const a = DB.answers["practiceQuestions|" + skillId + "|" + i];
        if (a) { done++; if (a.correct) correct++; }
      });
      return { total: list.length, done, correct, wrong: done - correct,
               acc: done ? correct / done : 0, complete: list.length > 0 && done === list.length };
    }
    // Unit CHALLENGE stats (all hard questions across a unit's skills)
    function unitChallengeStats(unit) {
      let total = 0, done = 0, correct = 0;
      unit.skills.forEach((s) => {
        const list = questionsFor("hardQuestions", s.id);
        total += list.length;
        list.forEach((q, i) => {
          const a = DB.answers["hardQuestions|" + s.id + "|" + i];
          if (a) { done++; if (a.correct) correct++; }
        });
      });
      return { total, done, correct, wrong: done - correct,
               acc: done ? correct / done : 0, complete: total > 0 && done === total };
    }
    // FINAL CHALLENGE stats (the standalone full mock exam — Paper C)
    function finalChallengeStats() {
      const list = (COURSE_DATA.finalChallenge && COURSE_DATA.finalChallenge.questions) || [];
      let done = 0, correct = 0;
      list.forEach((q, i) => {
        const a = DB.answers["finalChallenge|" + i];
        if (a) { done++; if (a.correct) correct++; }
      });
      return { total: list.length, done, correct, wrong: done - correct,
               acc: done ? correct / done : 0, complete: list.length > 0 && done === list.length };
    }

    /* ---------------- Timeline (milestone history, derived from existing data) ----------------
       No new event log — everything here is read off answers/activity/review that
       already exist, plus the one new profile.joinedAt field. */
    // activityStreak() only returns *current* counts — this mirrors its exact
    // day-diffing loop but records the day a threshold is first crossed, keeping
    // only the earliest crossing per threshold.
    function streakMilestoneDates() {
      const days = [...new Set(DB.activity.map((e) => dayKey(e.ts)))].sort();
      const THRESHOLDS = [7, 30, 100], found = {};
      let run = 1;
      for (let i = 1; i < days.length; i++) {
        const diff = Math.round((new Date(days[i]) - new Date(days[i - 1])) / 86400000);
        run = (diff === 1) ? run + 1 : 1;
        THRESHOLDS.forEach((n) => { if (run === n && !(n in found)) found[n] = days[i]; });
      }
      return found;
    }
    // Completion date = latest answer ts among the unit's questions, once every
    // skill in the unit is complete. A re-attempt after completion nudges the date
    // forward — acceptable since this derives from per-question `ts` only; no
    // separate "completed on" event is ever recorded.
    function unitCompletionDate(unit) {
      let complete = true, maxTs = 0;
      unit.skills.forEach((s) => {
        if (!practiceStats(s.id).complete) { complete = false; return; }
        questionsFor("practiceQuestions", s.id).forEach((q, i) => {
          const a = DB.answers["practiceQuestions|" + s.id + "|" + i];
          if (a && a.ts > maxTs) maxTs = a.ts;
        });
      });
      return complete ? maxTs : null;
    }
    function unitChallengeCompletionDate(unit) {
      if (!unitChallengeStats(unit).complete) return null;
      let maxTs = 0;
      unit.skills.forEach((s) => {
        questionsFor("hardQuestions", s.id).forEach((q, i) => {
          const a = DB.answers["hardQuestions|" + s.id + "|" + i];
          if (a && a.ts > maxTs) maxTs = a.ts;
        });
      });
      return maxTs;
    }
    function finalChallengeCompletionDate() {
      if (!finalChallengeStats().complete) return null;
      const list = (COURSE_DATA.finalChallenge && COURSE_DATA.finalChallenge.questions) || [];
      let maxTs = 0;
      list.forEach((q, i) => { const a = DB.answers["finalChallenge|" + i]; if (a && a.ts > maxTs) maxTs = a.ts; });
      return maxTs;
    }
    function timelineEvents() {
      const events = [], p = DB.profile || {};
      if (p.joinedAt) events.push({ ts: p.joinedAt, label: t("tlJoined") });
      if (DB.activity.length) events.push({ ts: DB.activity[0].ts, label: t("tlFirstQuestion") });
      const streaks = streakMilestoneDates();
      [7, 30, 100].forEach((n) => { if (streaks[n]) events.push({ ts: new Date(streaks[n]).getTime(), label: t("tlStreak").replace("{n}", n) }); });
      COURSE_DATA.units.forEach((u) => {
        const d = unitCompletionDate(u); if (d) events.push({ ts: d, label: t("tlUnitDone").replace("{u}", esc(locUnitName(u))) });
        const cd = unitChallengeCompletionDate(u); if (cd) events.push({ ts: cd, label: t("tlChallengeDone").replace("{u}", esc(locUnitName(u))) });
      });
      const fd = finalChallengeCompletionDate(); if (fd) events.push({ ts: fd, label: t("tlFinalDone") });
      events.sort((a, b) => a.ts - b.ts);
      return events;
    }

    // Global stats (every answered question, practice + challenge)
    function globalStats() {
      let topics = 0;
      allSkills().forEach(({ skill }) => { if (practiceStats(skill.id).complete) topics++; });
      let attempted = 0, correct = 0;
      Object.values(DB.answers).forEach((a) => { attempted++; if (a.correct) correct++; });
      return { topics, totalSkills: TOTAL_SKILLS, attempted, correct, wrong: attempted - correct,
               acc: attempted ? Math.round((correct / attempted) * 100) : 0 };
    }
    function dotClass(s) {
      if (!s.done) return "";
      if (s.acc >= 0.85) return "g";
      if (s.acc >= 0.6) return "a";
      return "r";
    }

    /* ---------------- question identity, difficulty & lookup ----------------
       A question's unique id (qid) is the same composite key already used by
       DB.answers: "bank|skillId|index" (or "finalChallenge|index"). It is stable
       as long as course-data.js question order is unchanged — so no per-question
       id needs to be added to the (large) data file. */
    const DIFFS = ["easy", "medium", "hard"];
    // Difficulty has no source field in the data, so it is derived from the bank
    // (chosen mapping): practice Qs split easy/medium by position within their
    // skill; the hard + final banks are all "hard".
    function difficultyOf(qid) {
      const p = String(qid).split("|");
      const bank = p[0];
      if (bank === "hardQuestions" || bank === "finalChallenge") return "hard";
      const list = questionsFor("practiceQuestions", p[1]);
      const half = Math.ceil(list.length / 2);
      return (+p[2] < half) ? "easy" : "medium";
    }
    // Resolve a qid back to its question object + context for review/saved lists.
    function questionByQid(qid) {
      const p = String(qid).split("|");
      if (p[0] === "finalChallenge") {
        const list = (COURSE_DATA.finalChallenge && COURSE_DATA.finalChallenge.questions) || [];
        return { q: list[+p[1]], key: qid };
      }
      const list = questionsFor(p[0], p[1]);
      return { q: list[+p[2]], key: qid, skillId: p[1] };
    }
    function skillTitleForQid(qid) {
      const p = String(qid).split("|");
      if (p[0] === "finalChallenge") return finalChallengeTitle();
      const f = findSkill(p[1]);
      return f ? locTitle(f.skill) : p[1];
    }

    /* ---------------- attempt activity log ----------------
       Every checked answer appends one event so daily charts / heatmap / streaks
       and avg-time-by-difficulty have a real history (DB.answers only keeps the
       latest attempt per question and is overwritten on re-attempts). */
    // ts is shared with the matching DB.answers entry so the two stay consistent
    // (and the seed-backfill de-dup below recognises an already-logged attempt).
    function logAttempt(qid, correct, ms, ts) {
      DB.activity.push({ ts: ts || Date.now(), qid: qid, correct: !!correct,
        diff: difficultyOf(qid), ms: (ms != null && ms >= 0) ? ms : null });
      trimActivity();
    }
    // Keep the activity log bounded: drop events older than the analytics window
    // and hard-cap the count, so the blob can't grow without limit (quota + sync cost).
    const ACTIVITY_MAX_DAYS = 240, ACTIVITY_MAX = 3000;
    function trimActivity() {
      if (!Array.isArray(DB.activity) || !DB.activity.length) return;
      const cutoff = Date.now() - ACTIVITY_MAX_DAYS * 86400000;
      if (DB.activity[0].ts < cutoff) DB.activity = DB.activity.filter((e) => e.ts >= cutoff);
      if (DB.activity.length > ACTIVITY_MAX) DB.activity = DB.activity.slice(DB.activity.length - ACTIVITY_MAX);
    }
    // One-time backfill: seed history from past answers so existing users see
    // their charts populated immediately. De-dup on sync handles re-seeds.
    function seedActivity() {
      if (DB.activitySeeded) return;
      const have = new Set(DB.activity.map((e) => e.ts + "|" + e.qid));
      Object.keys(DB.answers).forEach((qid) => {
        const a = DB.answers[qid];
        if (!a || a.ts == null) return;
        const k = a.ts + "|" + qid;
        if (have.has(k)) return;
        DB.activity.push({ ts: a.ts, qid: qid, correct: !!a.correct,
          diff: difficultyOf(qid), ms: null });
      });
      DB.activity.sort((x, y) => x.ts - y.ts);
      trimActivity();
      DB.activitySeeded = true;
      saveLocal();
    }

    // Reconciles the two local copies of the profile: the profile-store key written
    // by signup.html, and DB.profile inside the stats blob written by the in-app
    // Profile page — same "adopt on read" spirit as seedActivity() above. Also
    // backfills joinedAt for any profile that predates this field. Cheap enough to
    // run every boot (unlike seedActivity()'s one-time O(n) backfill, gated above).
    function reconcileProfile() {
      let local = null;
      try { local = JSON.parse(localStorage.getItem(PROFILE_STORE) || "null"); } catch (e) {}
      DB.profile = mergeProfile(DB.profile, local);
      if (!DB.profile.joinedAt) DB.profile.joinedAt = (DB.activity[0] && DB.activity[0].ts) || Date.now();
      if (!DB.profile.updatedAt) DB.profile.updatedAt = Date.now();
      try { localStorage.setItem(PROFILE_STORE, JSON.stringify(DB.profile)); } catch (e) {}
      saveLocal();
    }

    /* ---------------- saved / bookmarked questions ---------------- */
    const isSaved = (qid) => { const s = DB.saved[qid]; return !!(s && s.on); };
    function toggleSaved(qid) {
      const cur = isSaved(qid);
      DB.saved[qid] = { on: !cur, ts: Date.now() };
      save();
      return !cur;
    }
    function savedQids() {
      return Object.keys(DB.saved)
        .filter((qid) => DB.saved[qid] && DB.saved[qid].on && questionByQid(qid).q)
        .sort((a, b) => (DB.saved[b].ts || 0) - (DB.saved[a].ts || 0));
    }
    // Questions whose most recent answer was wrong (the mistake log).
    function mistakeQids() {
      return Object.keys(DB.answers)
        .filter((qid) => DB.answers[qid] && !DB.answers[qid].correct && questionByQid(qid).q)
        .sort((a, b) => (DB.answers[b].ts || 0) - (DB.answers[a].ts || 0));
    }

    /* ---------------- spaced repetition ---------------- */
    function scheduleReview(skillId) {
      const ps = practiceStats(skillId);
      if (!ps.total || !ps.complete) return;       // schedule only when practice set is complete
      const r = DB.review[skillId] || { stage: 0 };
      r.stage = ps.acc < 0.6 ? 0 : Math.min((r.stage || 0) + 1, INTERVALS.length - 1);
      r.due = Date.now() + INTERVALS[r.stage] * 86400000;
      r.last = Date.now();
      r.acc = ps.acc;
      DB.review[skillId] = r;
      save();
    }
    function dueSkills() {
      const now = Date.now();
      return allSkills().filter(({ skill }) => {
        const r = DB.review[skill.id];
        return r && r.due && r.due <= now;
      });
    }
    const isDue = (id) => { const r = DB.review[id]; return !!(r && r.due && r.due <= Date.now()); };

    /* ---------------- re-practice / review reset ----------------
       A review (or "Practice again") is a FRESH attempt: clear the skill's stored
       practice answers first, then start practice. Completing it re-runs
       scheduleReview() with the new accuracy, advancing the spaced-repetition stage. */
    function resetSkillPractice(id) {
      questionsFor("practiceQuestions", id).forEach((q, i) => {
        delete DB.answers["practiceQuestions|" + id + "|" + i];
      });
      save();
    }
    function reviewSkill(id) {
      resetSkillPractice(id);
      startPractice(id);
    }

    /* ---------------- view + session state ---------------- */
    const MIN_PER_Q = 3;  // unit-test (challenge) time budget: 3 minutes per question
    let state = { view: "home", skillId: null };
    let session = null;   // { kind:'practice'|'challenge', back, skillId?, unitNo?, items:[...],
                          //   selections?, deadline?, totalMs?, finished?, timeUp?, finishedAt?, review?, results? }
    let qIndex = 0;
    let showSol = false;
    let quizStart = null;
    let qShownAt = null;   // when the current question was rendered (per-question timing)
    let pendingIdx = null; // selected but not yet checked
    let practiceFilter = "all"; // Practice page filter: all | inprogress | notstarted | mastered

    function goHome() { state = { view: "home" }; session = null; quizStart = null; pendingIdx = null; render(); scroll0(); }
    function openSkill(id) { state = { view: "topic", skillId: id }; session = null; quizStart = null; pendingIdx = null; render(); scroll0(); }

    function startPractice(id) {
      const { skill } = findSkill(id);
      const list = questionsFor("practiceQuestions", id);
      session = { kind: "practice", skillId: id,
        back: { type: "topic", id: id },
        items: list.map((q, i) => ({ q: q, key: "practiceQuestions|" + id + "|" + i, skillId: id })) };
      qIndex = firstUnanswered(session); showSol = false; pendingIdx = null; quizStart = Date.now();
      state = { view: "quiz" }; render(); scroll0();
    }
    function startPracticeAll() {
      const items = [];
      allSkills().forEach(({ skill }) => {
        questionsFor("practiceQuestions", skill.id).forEach((q, i) => {
          items.push({ q: q, key: "practiceQuestions|" + skill.id + "|" + i, skillId: skill.id });
        });
      });
      if (!items.length) return;
      session = { kind: "practice", allTopics: true, skillId: null, back: { type: "practice" }, items: items };
      qIndex = firstUnanswered(session); showSol = false; pendingIdx = null; quizStart = Date.now();
      state = { view: "quiz" }; render(); scroll0();
    }
    function startUnitChallenge(unitNo) {
      const unit = COURSE_DATA.units.find((u) => u.unit === unitNo);
      const items = [];
      unit.skills.forEach((s) => {
        questionsFor("hardQuestions", s.id).forEach((q, i) => {
          const key = "hardQuestions|" + s.id + "|" + i;
          delete DB.answers[key];   // a timed test is always a fresh attempt
          items.push({ q: q, key: key, skillId: s.id });
        });
      });
      save();
      const totalMs = items.length * MIN_PER_Q * 60000;
      quizStart = Date.now();
      session = { kind: "challenge", unitNo: unitNo, back: { type: "dashboard" },
        items: items, selections: {}, totalMs: totalMs, deadline: quizStart + totalMs,
        finished: false, timeUp: false, review: false };
      qIndex = 0; showSol = false; pendingIdx = null;
      state = { view: "quiz" }; render(); scroll0();
    }
    function startFinalChallenge() {
      const list = (COURSE_DATA.finalChallenge && COURSE_DATA.finalChallenge.questions) || [];
      if (!list.length) return;
      const items = list.map((q, i) => {
        const key = "finalChallenge|" + i;
        delete DB.answers[key];   // a timed test is always a fresh attempt
        return { q: q, key: key };
      });
      save();
      const totalMs = items.length * MIN_PER_Q * 60000;   // 40 x 3 min = 120 minutes
      quizStart = Date.now();
      session = { kind: "challenge", isFinal: true, back: { type: "dashboard" },
        items: items, selections: {}, totalMs: totalMs, deadline: quizStart + totalMs,
        finished: false, timeUp: false, review: false };
      qIndex = 0; showSol = false; pendingIdx = null;
      state = { view: "quiz" }; render(); scroll0();
    }
    function firstUnanswered(s) { const i = s.items.findIndex((it) => !DB.answers[it.key]); return i < 0 ? 0 : i; }
    function leaveSession() {
      // A focused review list returns to where it was opened (Saved / Mistakes);
      // every other session returns to the dashboard.
      if (session && session.isList && session.back && session.back.type) {
        goView(session.back.type); return;
      }
      goHome();
    }

    /* ---------------- focused review of a qid list (Saved / Mistakes) ----------------
       Runs the given questions through the normal practice runner. Already-answered
       questions show their verdict + worked solution; unanswered ones can be solved. */
    function startReview(qids, backView, titleKey) {
      const items = qids.map(questionByQid).filter((it) => it.q);
      if (!items.length) return;
      session = { kind: "practice", isList: true, listTitleKey: titleKey,
        skillId: null, back: { type: backView || "dashboard" }, items: items };
      qIndex = 0; showSol = true; pendingIdx = null; quizStart = Date.now();
      state = { view: "quiz" }; render(); scroll0();
    }
    // Re-attempt a single mistake fresh: clear its stored answer, then review-run it.
    function retryQid(qid, backView) {
      delete DB.answers[qid];
      save();
      startReview([qid], backView, "practice");
    }

    /* ---------------- timers ---------------- */
    const pad = (n) => String(n).padStart(2, "0");
    function fmt(ms) {
      const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
      return (h ? h + ":" + pad(m) : pad(m)) + ":" + pad(ss);
    }
    function updateTimers() {
      const qt = document.getElementById("quizTimer");
      if (!qt) return;
      // Unit test (challenge): countdown that auto-submits when it hits zero.
      if (session && session.kind === "challenge" && !session.review && session.deadline) {
        if (session.finished) return;
        const remain = session.deadline - Date.now();
        if (remain <= 0) { qt.textContent = "00:00"; finishChallenge(true); return; }
        qt.textContent = fmt(remain);
        const wrap = qt.closest(".timer");
        if (wrap) wrap.classList.toggle("low", remain <= 60000);
        return;
      }
      // Practice: count up.
      if (quizStart) qt.textContent = fmt(Date.now() - quizStart);
    }
    setInterval(updateTimers, 1000);

    /* ---------------- finish a timed unit test ---------------- */
    function finishChallenge(timeUp) {
      if (!session || session.kind !== "challenge" || session.finished) return;
      session.finished = true;
      session.timeUp = !!timeUp;
      session.finishedAt = Date.now();
      // Commit the answers the student selected; skipped questions stay unanswered.
      let correct = 0, answered = 0;
      session.items.forEach((it, i) => {
        const sel = session.selections[i];
        if (sel == null) return;
        answered++;
        const ok = sel === it.q.answer;
        if (ok) correct++;
        const ts = Date.now();
        DB.answers[it.key] = { sel: sel, correct: ok, ts: ts };
        logAttempt(it.key, ok, session.qTime ? session.qTime[i] : null, ts);
      });
      save();
      const total = session.items.length;
      session.results = {
        total: total, answered: answered, correct: correct,
        wrong: answered - correct, skipped: total - answered,
        acc: total ? Math.round((correct / total) * 100) : 0,
        timeUsedMs: timeUp ? session.totalMs : (session.finishedAt - quizStart)
      };
      state = { view: "results" }; render(); scroll0();
    }

    /* ---------------- monitoring analytics (from DB.activity) ---------------- */
    const dayKey = (ts) => { const d = new Date(ts); return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); };
    function fmtAvg(ms) {
      if (ms == null) return "—";
      const s = ms / 1000;
      if (s < 60) return (s < 10 ? s.toFixed(1) : Math.round(s)) + "s";
      const m = Math.floor(s / 60), ss = Math.round(s % 60);
      return m + "m " + ss + "s";
    }
    // Attempts grouped by difficulty: count, accuracy and average time.
    function difficultyStats() {
      const acc = {}; DIFFS.forEach((k) => acc[k] = { att: 0, cor: 0, ms: 0, msN: 0 });
      DB.activity.forEach((e) => {
        const d = acc[e.diff]; if (!d) return;
        d.att++; if (e.correct) d.cor++;
        if (e.ms != null) { d.ms += e.ms; d.msN++; }
      });
      return DIFFS.map((k) => ({ diff: k, att: acc[k].att, cor: acc[k].cor, wrong: acc[k].att - acc[k].cor,
        acc: acc[k].att ? acc[k].cor / acc[k].att : 0, avgMs: acc[k].msN ? acc[k].ms / acc[k].msN : null }));
    }
    // Day-by-day attempted / correct / wrong / saved for the last nDays.
    function dailySeries(nDays) {
      const map = {};
      const bump = (k) => (map[k] = map[k] || { att: 0, cor: 0, saved: 0 });
      DB.activity.forEach((e) => { const m = bump(dayKey(e.ts)); m.att++; if (e.correct) m.cor++; });
      Object.keys(DB.saved).forEach((qid) => { const s = DB.saved[qid]; if (s && s.on && s.ts) bump(dayKey(s.ts)).saved++; });
      const out = [], today = new Date(); today.setHours(0, 0, 0, 0);
      for (let i = nDays - 1; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const m = map[dayKey(d.getTime())] || { att: 0, cor: 0, saved: 0 };
        out.push({ date: new Date(d), attempted: m.att, correct: m.cor, wrong: m.att - m.cor, saved: m.saved });
      }
      return out;
    }
    function activityStreak() {
      const days = new Set(); DB.activity.forEach((e) => days.add(dayKey(e.ts)));
      if (!days.size) return { current: 0, longest: 0, active: 0 };
      const keys = [...days].sort();
      let longest = 1, run = 1;
      for (let i = 1; i < keys.length; i++) {
        const diff = Math.round((new Date(keys[i]) - new Date(keys[i - 1])) / 86400000);
        if (diff === 1) { run++; longest = Math.max(longest, run); } else run = 1;
      }
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const probe = new Date(today);
      if (!days.has(dayKey(probe.getTime()))) probe.setDate(probe.getDate() - 1); // a streak can still be "alive" through yesterday
      let current = 0;
      while (days.has(dayKey(probe.getTime()))) { current++; probe.setDate(probe.getDate() - 1); }
      return { current: current, longest: longest, active: days.size };
    }
    // Shared streak stat-card markup — used on both Analytics and Profile.
    function streakCard() {
      const streak = activityStreak();
      return '<div class="stat"><div class="stat-label">' + icon("flame", "icon-sm") + ' ' + t("streak") + '</div>' +
        '<div class="stat-val">' + streak.current + '<span class="stat-sub"> ' + t("days") + '</span></div>' +
        '<div class="stat-foot">' + t("longest") + ' ' + streak.longest + '</div></div>';
    }

    /* ---------------- SVG: multi-series daily line chart ---------------- */
    function lineChartSVG(days) {
      const W = 760, H = 240, pad = { l: 30, r: 12, t: 14, b: 24 };
      const plotW = W - pad.l - pad.r, plotH = H - pad.t - pad.b, n = days.length;
      let maxV = 1; days.forEach((d) => { maxV = Math.max(maxV, d.attempted, d.saved); });
      const niceMax = maxV <= 5 ? 5 : Math.ceil(maxV / 5) * 5;
      const X = (i) => pad.l + (n <= 1 ? plotW / 2 : (i / (n - 1)) * plotW);
      const Y = (v) => pad.t + plotH - (v / niceMax) * plotH;
      const series = [
        { k: "attempted", c: "var(--blue)" }, { k: "correct", c: "var(--green)" },
        { k: "wrong", c: "var(--red)" }, { k: "saved", c: "var(--amber)" }
      ];
      let grid = "";
      [0, 0.5, 1].forEach((f) => {
        const v = Math.round(niceMax * f), y = Y(v);
        grid += '<line class="lc-grid" x1="' + pad.l + '" y1="' + y + '" x2="' + (W - pad.r) + '" y2="' + y + '"/>' +
          '<text class="lc-ytick" x="' + (pad.l - 6) + '" y="' + (y + 3) + '" text-anchor="end">' + v + '</text>';
      });
      const polys = series.map((s) => {
        const pts = days.map((d, i) => X(i) + "," + Y(d[s.k])).join(" ");
        return '<polyline class="lc-line" data-series="' + s.k + '" fill="none" stroke="' + s.c +
          '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" points="' + pts + '"/>';
      }).join("");
      // x-axis date labels (about 5, evenly spaced)
      let xlab = "";
      const step = Math.max(1, Math.round(n / 5));
      for (let i = 0; i < n; i += step) {
        xlab += '<text class="lc-xtick" x="' + X(i) + '" y="' + (H - 6) + '" text-anchor="middle">' +
          days[i].date.toLocaleDateString(t("locale"), { day: "numeric", month: "short" }) + '</text>';
      }
      const bandW = plotW / Math.max(1, n);
      const bands = days.map((d, i) =>
        '<rect class="lc-band" data-i="' + i + '" x="' + (X(i) - bandW / 2) + '" y="' + pad.t +
        '" width="' + bandW + '" height="' + plotH + '" fill="transparent"/>').join("");
      return '<svg class="linechart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" role="img">' +
        grid + polys + xlab +
        '<line class="lc-cursor" x1="0" y1="' + pad.t + '" x2="0" y2="' + (pad.t + plotH) + '" style="display:none"/>' +
        bands + '</svg>';
    }
    function chartLegend() {
      const items = [["attempted", "var(--blue)"], ["correct", "var(--green)"], ["wrong", "var(--red)"], ["saved", "var(--savedLeg)"]];
      return '<div class="lc-legend">' + items.map(([k, c]) =>
        '<button class="lc-leg" data-series="' + k + '"><span class="lc-swatch" style="background:' +
        (k === "saved" ? "var(--amber)" : c) + '"></span>' + t("leg_" + k) + '</button>').join("") + '</div>';
    }

    /* ---------------- SVG: GitHub-style activity heatmap ---------------- */
    function heatmapData(weeks) {
      const counts = {}; DB.activity.forEach((e) => { const k = dayKey(e.ts); counts[k] = (counts[k] || 0) + 1; });
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const end = new Date(today); end.setDate(end.getDate() + (6 - end.getDay())); // pad to end of this week (Sat)
      const total = weeks * 7, start = new Date(end); start.setDate(start.getDate() - (total - 1));
      const cells = [];
      for (let i = 0; i < total; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const future = d.getTime() > today.getTime();
        cells.push({ date: new Date(d), key: dayKey(d.getTime()), count: future ? -1 : (counts[dayKey(d.getTime())] || 0) });
      }
      return { cells: cells, weeks: weeks, start: start };
    }
    const heatLevel = (c) => c < 0 ? -1 : c === 0 ? 0 : c <= 2 ? 1 : c <= 5 ? 2 : c <= 9 ? 3 : 4;
    function heatmapSVG(hm) {
      const cell = 13, gap = 3, top = 14, left = 26, unit = cell + gap;
      const W = left + hm.weeks * unit, H = top + 7 * unit + 4;
      let cellsSvg = "", months = "";
      let lastMonth = -1;
      hm.cells.forEach((c, i) => {
        const col = Math.floor(i / 7), row = i % 7;
        const x = left + col * unit, y = top + row * unit;
        const lvl = heatLevel(c.count);
        cellsSvg += '<rect class="hm-cell hm-' + lvl + '" data-key="' + c.key + '" data-count="' + c.count +
          '" x="' + x + '" y="' + y + '" width="' + cell + '" height="' + cell + '" rx="2"/>';
        // month label when a new month starts at the top of a column
        if (row === 0) {
          const m = c.date.getMonth();
          if (m !== lastMonth) {
            lastMonth = m;
            months += '<text class="hm-month" x="' + x + '" y="' + (top - 4) + '">' +
              c.date.toLocaleDateString(t("locale"), { month: "short" }) + '</text>';
          }
        }
      });
      const dows = [["Mon", 1], ["Wed", 3], ["Fri", 5]];
      let dowLab = dows.map(([lbl, r]) =>
        '<text class="hm-dow" x="' + (left - 6) + '" y="' + (top + r * unit + cell - 3) + '" text-anchor="end">' +
        t("dow_" + lbl.toLowerCase()) + '</text>').join("");
      return '<svg class="heatmap" viewBox="0 0 ' + W + ' ' + H + '" role="img" width="' + W + '" height="' + H + '">' +
        months + dowLab + cellsSvg + '</svg>';
    }
    function heatLegend() {
      let sw = "";
      for (let l = 0; l <= 4; l++) sw += '<span class="hm-cell hm-' + l + ' hm-swatch"></span>';
      return '<div class="hm-legend"><span>' + t("hmLess") + '</span>' + sw + '<span>' + t("hmMore") + '</span></div>';
    }
