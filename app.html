      const bp = el("button", "btn-primary");
      if (ps.complete) {
        // Skill already finished: primary action re-practises fresh, ghost lets you review past answers.
        bp.textContent = t("practiceAgain");
        bp.addEventListener("click", () => { if (confirm(t("resetSkillConfirm"))) reviewSkill(skill.id); });
        const rev = el("button", "btn-ghost");
        rev.textContent = t("reviewAnswers");
        rev.addEventListener("click", () => startPractice(skill.id));
        row.append(bp, rev);
      } else {
        bp.textContent = t("startPractice") + " (" + nQ + ")";
        if (nQ === 0) bp.disabled = true;
        bp.addEventListener("click", () => { if (nQ) startPractice(skill.id); });
        row.append(bp);
      }

      wrap.append(exp, rev, row);
      tc.appendChild(wrap);
      typeset(wrap);
    }

    /* ---------------- Bluebook quiz runner ---------------- */
    function renderQuiz() {
      if (!session || !session.items.length) { leaveSession(); return; }  // nothing to show — bail safely
      let title;
      if (session.isList) {
        title = t(session.listTitleKey || "review");
      } else if (session.kind === "practice") {
        title = session.allTopics ? t("practiceAllTitle")
              : t("practice") + " · " + locTitle(findSkill(session.skillId).skill);
      } else if (session.isFinal) {
        title = finalChallengeTitle();
      } else {
        const u = COURSE_DATA.units.find((x) => x.unit === session.unitNo);
        title = challengeTitle(u.unit, locUnitName(u));
      }
      const inTest = session.kind === "challenge" && !session.review;  // taking a timed unit test
      const showCheck = session.kind === "practice";                   // no Check in unit tests
      const showExplain = session.kind === "practice" || session.review;
      const showTimer = session.kind === "practice" || inTest;         // hidden while reviewing a test

      let actions = '<button class="btn-ghost" id="prevBtn">' + t("previous") + '</button>';
      if (showExplain) actions += '<button class="btn-ghost" id="explainBtn">' + t("explanation") + '</button>';
      if (showCheck) actions += '<button class="btn-primary" id="checkBtn" disabled>' + t("check") + '</button>';
      actions += '<button class="btn-ghost" id="nextBtn">' + t("next") + '</button>';

      app.innerHTML =
        '<button class="back" id="backBtn">' + icon("arrowLeft", "icon-sm") + ' ' + t("dashboard") + '</button>' +
        '<div class="runner">' +
          '<div class="runner-top"><div class="runner-title">' + esc(title) + '</div>' +
            '<div class="runner-tools">' +
              '<button class="bookmark-btn" id="bookmarkBtn" aria-pressed="false" title="' + esc(t("saveQuestion")) + '">' + icon("bookmark", "icon-sm") + '</button>' +
              (showTimer ? '<div class="timer"><span class="ic">' + icon("clock", "icon-xs") + '</span><span id="quizTimer">00:00</span></div>' : '') +
            '</div>' +
          '</div>' +
          '<div id="stage" class="stage"></div>' +
          '<div class="runner-bar"><div class="count" id="qCount"></div>' +
            '<div class="bar-actions">' + actions + '</div></div>' +
        '</div>';

      document.getElementById("backBtn").addEventListener("click", () => {
        if (session.kind === "challenge" && !session.review && !session.finished) {
          if (!confirm(t("leaveTestConfirm"))) return;
        }
        leaveSession();
      });
      document.getElementById("prevBtn").addEventListener("click", () => {
        if (qIndex > 0) { qIndex--; showSol = false; pendingIdx = null; renderStage(); }
      });
      document.getElementById("nextBtn").addEventListener("click", () => {
        if (qIndex >= session.items.length - 1) {
          if (inTest) finishChallenge(false);
          else if (session.kind === "challenge" && session.review) { state = { view: "results" }; render(); scroll0(); }
          else leaveSession();
        } else { qIndex++; showSol = false; pendingIdx = null; renderStage(); }
      });
      const explainBtn = document.getElementById("explainBtn");
      if (explainBtn) explainBtn.addEventListener("click", () => {
        if (!DB.answers[session.items[qIndex].key]) return;
        showSol = !showSol; renderStage();
      });
      const checkBtn0 = document.getElementById("checkBtn");
      if (checkBtn0) checkBtn0.addEventListener("click", () => {
        if (pendingIdx === null || DB.answers[session.items[qIndex].key]) return;
        const idx = pendingIdx;
        pendingIdx = null;
        answer(idx);
      });
      const bm = document.getElementById("bookmarkBtn");
      if (bm) bm.addEventListener("click", () => { toggleSaved(session.items[qIndex].key); syncBookmarkBtn(); });

      renderStage();
    }
    // Reflect the current question's saved state on the bookmark toggle.
    function syncBookmarkBtn() {
      const bm = document.getElementById("bookmarkBtn");
      if (!bm || !session || !session.items[qIndex]) return;
      const on = isSaved(session.items[qIndex].key);
      bm.classList.toggle("on", on);
      bm.setAttribute("aria-pressed", String(on));
      bm.title = on ? t("savedRemove") : t("saveQuestion");
    }

    function answer(idx) {
      const it = session.items[qIndex];
      if (DB.answers[it.key]) return;
      const correct = idx === it.q.answer;
      const ms = qShownAt ? (Date.now() - qShownAt) : null;
      const ts = Date.now();
      DB.answers[it.key] = { sel: idx, correct: correct, ts: ts };
      logAttempt(it.key, correct, ms, ts);
      save();
      if (session.kind === "practice") scheduleReview(session.skillId);
      renderStage();
    }

    function renderStage() {
      const it = session.items[qIndex];
      const q = it.q;
      const a = DB.answers[it.key];
      const qText = q.q;
      const qOpts = q.options;
      const qSol = q.solution;
      const stage = document.getElementById("stage");
      stage.innerHTML = "";

      const qt = el("div", "q-big"); qt.textContent = qText; stage.appendChild(qt);

      const inTest = session.kind === "challenge" && !session.review;  // timed test: no feedback yet
      const choices = el("div", "choices");
      q.options.forEach((opt, idx) => {
        const b = el("button", "choice");
        const L = el("span", "ch-letter"); L.textContent = LABELS[idx];
        const T = el("span", "ch-text"); T.textContent = qOpts[idx];
        b.append(L, T);
        if (inTest) {
          // Timed unit test — record selection only, reveal nothing until the test ends.
          if (idx === session.selections[qIndex]) b.classList.add("chosen");
          b.addEventListener("click", () => {
            document.querySelectorAll("#stage .choice").forEach(c => c.classList.remove("chosen"));
            b.classList.add("chosen");
            session.selections[qIndex] = idx;
            session.qTime = session.qTime || {};
            session.qTime[qIndex] = qShownAt ? (Date.now() - qShownAt) : null;
          });
        } else if (a) {
          b.disabled = true;
          if (idx === q.answer) b.classList.add("correct");
          else if (idx === a.sel) b.classList.add("wrong");
          if (idx === a.sel) b.classList.add("chosen");
        } else {
          if (idx === pendingIdx) b.classList.add("chosen");
          b.addEventListener("click", () => {
            document.querySelectorAll("#stage .choice").forEach(c => c.classList.remove("chosen"));
            b.classList.add("chosen");
            pendingIdx = idx;
            const cb = document.getElementById("checkBtn");
            if (cb) cb.disabled = false;
          });
        }
        choices.appendChild(b);
      });
      stage.appendChild(choices);

      if (a && showSol) {
        const ex = el("div", "explain");
        const v = el("div", "explain-verdict " + (a.correct ? "ok" : "bad"));
        v.textContent = a.correct ? t("verdictOk") : t("verdictBad");
        const sl = el("div", "explain-label"); sl.textContent = t("workedSolution");
        const sb = el("div", "explain-body"); sb.textContent = qSol || "—";
        ex.append(v, sl, sb);
        stage.appendChild(ex);
      }

      document.getElementById("qCount").textContent = (qIndex + 1) + " " + t("of") + " " + session.items.length;
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const exBtn = document.getElementById("explainBtn");
      const checkBtn = document.getElementById("checkBtn");
      prevBtn.disabled = qIndex === 0;
      nextBtn.textContent = qIndex === session.items.length - 1 ? t("finish") : t("next");
      if (exBtn) { exBtn.disabled = !a; exBtn.classList.toggle("active", !!(a && showSol)); }
      if (checkBtn) { checkBtn.disabled = !!a || pendingIdx === null; checkBtn.style.display = a ? "none" : ""; }

      typeset(stage);
      syncBookmarkBtn();
      qShownAt = Date.now();   // start the per-question timer for this question
    }

    /* ---------------- test results screen ---------------- */
    function renderResults() {
      if (!session || !session.results) { goHome(); return; }
      const u = session.isFinal ? null : COURSE_DATA.units.find((x) => x.unit === session.unitNo);
      const subTitle = session.isFinal ? finalChallengeTitle() : challengeTitle(u.unit, locUnitName(u));
      const r = session.results;
      app.innerHTML =
        '<button class="back" id="backBtn">' + icon("arrowLeft", "icon-sm") + ' ' + t("dashboard") + '</button>' +
        '<div class="results">' +
          '<h2>' + t("testResults") + '</h2>' +
          '<div class="res-sub">' + esc(subTitle) + '</div>' +
          (session.timeUp ? '<div class="res-banner">' + icon("clock", "icon-sm") + ' ' + t("timeUpMsg") + '</div>' : '') +
          '<div class="res-score"><span class="big">' + r.correct + ' / ' + r.total + '</span>' +
            '<span class="pct">' + r.acc + '% ' + t("accuracy") + '</span></div>' +
          '<div class="res-grid">' +
            resCell(t("correct"), r.correct, "correct") +
            resCell(t("wrong"), r.wrong, "wrong") +
            resCell(t("skipped"), r.skipped) +
            resCell(t("timeUsed"), fmt(r.timeUsedMs)) +
          '</div>' +
          '<div class="res-actions">' +
            '<button class="btn-primary" id="reviewBtn">' + t("reviewAnswers") + '</button>' +
            '<button class="btn-ghost" id="dashBtn">' + t("backToDash") + '</button>' +
          '</div>' +
        '</div>';
      document.getElementById("backBtn").addEventListener("click", goHome);
      document.getElementById("dashBtn").addEventListener("click", goHome);
      document.getElementById("reviewBtn").addEventListener("click", () => {
        session.review = true; qIndex = 0; showSol = false; pendingIdx = null;
        state = { view: "quiz" }; render(); scroll0();
      });
    }
    function resCell(label, val, cls) {
      return '<div class="res-cell ' + (cls || "") + '"><div class="l">' + label +
        '</div><div class="v">' + val + '</div></div>';
    }

    /* ---------------- Saved questions & Mistake log ---------------- */
    function qTextLocalized(qid) {
      const it = questionByQid(qid);
      return it.q ? it.q.q : "";
    }
    function diffBadge(diff) {
      const lbl = { easy: t("diffEasy"), medium: t("diffMedium"), hard: t("diffHard") }[diff] || diff;
      return '<span class="diff-badge ' + diff + '">' + lbl + '</span>';
    }
    // One row in a Saved / Mistakes list. kind: "saved" | "mistake".
    function qListRow(qid, kind) {
      const diff = difficultyOf(qid);
      const a = DB.answers[qid];
      let meta = '<span class="qrow-skill">' + esc(skillTitleForQid(qid)) + '</span>';
      if (kind === "mistake" && a) {
        const it = questionByQid(qid);
        const your = (it.q.options && it.q.options[a.sel] != null) ? LABELS[a.sel] : "—";
        const corr = LABELS[it.q.answer];
        meta += '<span class="qrow-ans"><span class="x">' + icon("x", "icon-xs") + ' ' + your + '</span> · <span class="ok">' + icon("check", "icon-xs") + ' ' + corr + '</span></span>';
      } else if (kind === "saved" && a) {
        meta += '<span class="qrow-ans ' + (a.correct ? "ok" : "x") + '">' +
          (a.correct ? icon("check", "icon-xs") + ' ' + t("verdictOk") : icon("x", "icon-xs") + ' ' + t("verdictBad")) + '</span>';
      }
      const action = kind === "saved"
        ? '<button class="qrow-x" data-unsave="' + esc(qid) + '" title="' + esc(t("savedRemove")) + '">' + icon("x", "icon-sm") + '</button>'
        : '<button class="qrow-x" data-retry="' + esc(qid) + '" title="' + esc(t("retry")) + '">' + icon("refresh", "icon-sm") + '</button>';
      return '<div class="qrow">' +
        '<button class="qrow-main" data-open="' + esc(qid) + '">' +
          '<div class="qrow-top">' + diffBadge(diff) + meta + '</div>' +
          '<div class="qrow-q">' + esc(qTextLocalized(qid)) + '</div>' +
        '</button>' + action +
      '</div>';
    }
    function renderQList(view) {
      const isSavedView = view === "saved";
      const qids = isSavedView ? savedQids() : mistakeQids();
      const titleKey = isSavedView ? "savedQuestions" : "mistakeLog";
      const subKey = isSavedView ? "savedSub" : "mistakeSub";
      const pageIcon = isSavedView ? "bookmark" : "alert";
      let html = '<div class="page-head"><div><h1>' + icon(pageIcon) + ' ' + esc(t(titleKey)) + '</h1>' +
        '<div class="ph-sub">' + esc(t(subKey)) + '</div></div></div>';

      if (!qids.length) {
        html += '<div class="empty-state"><div class="empty-ic">' + icon(pageIcon) + '</div>' +
          '<h2>' + esc(t(isSavedView ? "savedEmptyTitle" : "mistakeEmptyTitle")) + '</h2>' +
          '<p>' + esc(t(isSavedView ? "savedEmpty" : "mistakeEmpty")) + '</p>' +
          '<button class="btn-primary" id="emptyPracticeBtn">' + esc(t("startSession")) + '</button></div>';
        app.innerHTML = html;
        const emptyPracticeBtn = document.getElementById("emptyPracticeBtn");
        if (emptyPracticeBtn) emptyPracticeBtn.addEventListener("click", () => goView("practice"));
        return;
      }

      html += '<div class="practice-all"><div class="pa-text"><h3>' +
        esc(t(isSavedView ? "practiceSaved" : "reviewMistakes")) + '</h3>' +
        '<p>' + qids.length + ' ' + esc(t("questions")) + '</p></div>' +
        '<button class="btn-primary" id="reviewAllBtn">' + esc(t(isSavedView ? "startSession" : "reviewAll")) + '</button></div>';

      html += '<div class="listcard qlist">' + qids.map((qid) => qListRow(qid, isSavedView ? "saved" : "mistake")).join("") + '</div>';

      app.innerHTML = html;
      typeset(app);
      const allBtn = document.getElementById("reviewAllBtn");
      if (allBtn) allBtn.addEventListener("click", () => startReview(qids, view, titleKey));
      app.querySelectorAll("[data-open]").forEach((b) =>
        b.addEventListener("click", () => startReview([b.dataset.open], view, titleKey)));
      app.querySelectorAll("[data-unsave]").forEach((b) =>
        b.addEventListener("click", () => { toggleSaved(b.dataset.unsave); renderQList(view); }));
      app.querySelectorAll("[data-retry]").forEach((b) =>
        b.addEventListener("click", () => retryQid(b.dataset.retry, view)));
    }

    /* ---------------- router ---------------- */
    function render() {
      if (state.view === "home") renderHome();
      else if (state.view === "analytics") renderAnalytics();
      else if (state.view === "learn") renderLearn();
      else if (state.view === "practice") renderPractice();
      else if (state.view === "topic") renderTopic();
      else if (state.view === "results") renderResults();
      else if (state.view === "saved") renderQList("saved");
      else if (state.view === "mistakes") renderQList("mistakes");
      else if (state.view === "options") renderProfile();
      else if (state.view === "timeline") renderTimeline();
      else if (state.view === "feedback") renderPlaceholder("feedback", "message");
      else if (state.view === "join") renderPlaceholder("joinUs", "users");
      else renderQuiz();
      updateNav();
      updateTimers();
    }

    // Simple placeholder for sections we haven't built yet (keeps the menu honest).
    function renderPlaceholder(titleKey, iconName) {
      app.innerHTML =
        '<section class="greeting"><h1>' + (iconName ? icon(iconName) + ' ' : '') + esc(t(titleKey)) + '</h1>' +
        '<p class="subtitle">' + esc(t("comingSoon")) + '</p></section>';
    }
    // "Future {university} student" once set, else a generic default — the concrete
    // expression of the brand ("I'm a Nava student"), not just a list of features.
    function identityLine(p) {
      return (p && p.dreamUniversity) ? t("identityDream").replace("{u}", esc(p.dreamUniversity)) : t("identityDefault");
    }
    const PROFILE_FORM_FIELDS = ["name", "surname", "school", "grade", "region", "favoriteSubject", "dreamUniversity", "dreamCareer"];
    function renderProfile() {
      const p = DB.profile || {};
      const full = [p.name, p.surname].filter(Boolean).map(esc).join(" ") || esc(STUDENT || "") || "—";
      const examName = ({ newuu: "NewUU", wiut: "WIUT", dtm: "DTM" })[p.track] || "—";
      const avatarLetter = ((p.name || STUDENT || "?")[0] || "?").toUpperCase();

      app.innerHTML =
        '<section class="profile-head greeting">' +
          '<div class="profile-avatar">' + esc(avatarLetter) + '</div>' +
          '<div><h1>' + full + '</h1>' +
            '<p class="subtitle">' + identityLine(p) + '</p>' +
            '<p class="profile-meta">' + [esc(p.email || ""), esc(examName)].filter(Boolean).join(" · ") + '</p>' +
          '</div>' +
        '</section>' +
        statsRow() +
        '<section class="stats" style="grid-template-columns:repeat(2,1fr)">' +
          streakCard() +
          '<button class="stat go" data-go="timeline"><div class="stat-label">' + icon("clock", "icon-sm") + ' ' + esc(t("viewTimeline")) + '</div>' +
            '<div class="stat-val">' + activityStreak().active + '<span class="stat-sub"> ' + esc(t("days")) + '</span></div>' +
            '<div class="stat-foot">' + esc(t("viewAll")) + '</div></button>' +
        '</section>' +
        '<div class="section-title">' + esc(t("yourProfile")) + '</div>' +
        '<form id="profileForm" class="card profile-form">' +
          PROFILE_FORM_FIELDS.map((k) =>
            '<div class="profile-field"><label for="pf_' + k + '">' + esc(t(k)) + '</label>' +
              '<input type="text" id="pf_' + k + '" /></div>'
          ).join("") +
          '<div class="profile-field full"><label for="pf_bio">' + esc(t("bio")) + '</label>' +
            '<textarea id="pf_bio" rows="3"></textarea></div>' +
          '<button type="submit" class="btn-primary">' + esc(t("saveProfile")) + '</button>' +
        '</form>' +
        '<div class="dash-foot" style="text-align:left;margin-top:24px">' +
          '<button class="btn-ghost danger-btn" id="optLogout">' + icon("logout", "icon-sm") + ' ' + esc(t("logOut")) + '</button>' +
        '</div>';

      // Values are set here in JS, not via value="" attributes in the template above —
      // esc() doesn't escape quotes, and these are free-text fields that could
      // otherwise break out of the attribute.
      PROFILE_FORM_FIELDS.forEach((k) => { const el = document.getElementById("pf_" + k); if (el) el.value = p[k] || ""; });
      const bioEl = document.getElementById("pf_bio"); if (bioEl) bioEl.value = p.bio || "";

      const form = document.getElementById("profileForm");
      if (form) form.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const next = Object.assign({}, DB.profile);
        PROFILE_FORM_FIELDS.forEach((k) => { next[k] = document.getElementById("pf_" + k).value.trim(); });
        next.bio = document.getElementById("pf_bio").value.trim();
        next.updatedAt = Date.now();
        DB.profile = next;
        try { localStorage.setItem(PROFILE_STORE, JSON.stringify(DB.profile)); } catch (e) {}
        STUDENT = DB.profile.name || STUDENT;
        save();
        updateProfileUI();
        renderProfile();
      });

      app.querySelectorAll(".stat.go[data-go]").forEach((b) => b.addEventListener("click", () => goView(b.dataset.go)));
      const lo = document.getElementById("optLogout");
      if (lo) lo.addEventListener("click", doLogout);
    }

    function timelineRow(ev) {
      const dateStr = new Date(ev.ts).toLocaleDateString(t("locale"), { day: "numeric", month: "short", year: "numeric" });
      return '<div class="tl-row"><div class="tl-dot"></div><div class="tl-body">' +
        '<div class="tl-label">' + ev.label + '</div><div class="tl-date">' + esc(dateStr) + '</div>' +
      '</div></div>';
    }
    function renderTimeline() {
      const events = timelineEvents();
      app.innerHTML =
        '<button class="back" id="backBtn">' + icon("arrowLeft", "icon-sm") + ' ' + esc(t("yourProfile")) + '</button>' +
        '<section class="greeting"><h1>' + icon("clock") + ' ' + esc(t("timelineTitle")) + '</h1>' +
        '<p class="subtitle">' + esc(t("timelineSub")) + '</p></section>' +
        (events.length
          ? '<div class="card timeline">' + events.map(timelineRow).join("") + '</div>'
          : '<div class="empty-state"><h2>' + esc(t("timelineEmpty")) + '</h2></div>');
      document.getElementById("backBtn").addEventListener("click", () => goView("options"));
    }

    // highlight the sidebar item matching the current top-level section
    function updateNav() {
      const map = { home: "home", analytics: "analytics", learn: "learn", lesson: "learn",
                    practice: "practice", topic: "learn", saved: "saved",
                    mistakes: "mistakes", options: "options", timeline: "options",
                    feedback: "feedback", join: "join" };
      const active = map[state.view] || "home";
      document.querySelectorAll(".sb-item[data-view]").forEach((b) =>
        b.classList.toggle("active", b.dataset.view === active));
    }
    function goView(view) {
      state = { view: view }; session = null; quizStart = null; pendingIdx = null;
      render(); scroll0(); closeSidebar();
    }

    function doLogout() {
      if (!confirm(t("logOutConfirm"))) return;
      try { localStorage.removeItem(PROFILE_STORE); } catch (e) {}
      window.location.replace("index.html");
    }
    // Reflect the local profile in the bottom-of-sidebar profile card.
    function updateProfileUI() {
      const p = DB.profile || {};
      const name = [p.name, p.surname].filter(Boolean).join(" ") || STUDENT || "Guest";
      const av = document.getElementById("pfAvatar"); if (av) av.textContent = (name[0] || "?");
      const nm = document.getElementById("pfName"); if (nm) nm.textContent = name;
      const sub = document.getElementById("pfSub");
      if (sub) sub.textContent = p.email || ({ newuu: "NewUU", wiut: "WIUT", dtm: "DTM" }[p.track] || "");
    }

    /* ---------------- left sidebar wiring ---------------- */
    const sidebar = document.getElementById("sidebar");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");
    function openSidebar() { sidebar.classList.add("open"); sidebarBackdrop.hidden = false;
      const tg = document.getElementById("navToggle"); if (tg) tg.setAttribute("aria-expanded", "true"); }
    function closeSidebar() { sidebar.classList.remove("open"); sidebarBackdrop.hidden = true;
      const tg = document.getElementById("navToggle"); if (tg) tg.setAttribute("aria-expanded", "false"); }
    const navToggle = document.getElementById("navToggle");
    if (navToggle) navToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      if (sidebar.classList.contains("open")) closeSidebar(); else openSidebar();
    });
    sidebarBackdrop.addEventListener("click", closeSidebar);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSidebar(); });

    document.querySelectorAll(".js-home").forEach((b) => b.addEventListener("click", () => { goHome(); closeSidebar(); }));
    document.querySelectorAll(".sb-item[data-view], .pf-open[data-view]").forEach((b) =>
      b.addEventListener("click", () => goView(b.dataset.view)));

    document.getElementById("themeItem").addEventListener("click", toggleTheme);
    document.getElementById("langItem").addEventListener("click", toggleLang);

    const moreBtn = document.getElementById("moreBtn");
    const moreMenu = document.getElementById("moreMenu");
    moreBtn.addEventListener("click", () => {
      const show = moreMenu.hidden;
      moreMenu.hidden = !show;
      moreBtn.setAttribute("aria-expanded", String(show));
    });

    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) logoutBtn.addEventListener("click", (e) => { e.stopPropagation(); doLogout(); });

    document.documentElement.lang = LANG;
    hydrateIcons(document);
    updateLangUI();
    applyTheme();
    seedActivity();
    reconcileProfile();
    if (DB.profile && DB.profile.name) STUDENT = DB.profile.name;
    updateProfileUI();
    render();
    cloud.init();
  })();
  </script>
</body>
</html>
